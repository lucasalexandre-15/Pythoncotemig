{% extends 'base.html' %}

{% block titulo %}
    <h1>Adicione um novo livro</h1>
{% endblock %}

{% block conteudo %}

<h2>Cadastre um novo livro</h2>
<form action="/biblioteca/criar" method="POST" style="display: flex; flex-wrap: wrap; gap: 15px; max-width: 800px;">
    <div style="flex: 1; min-width: 200px;">
        <label style="display: block; margin-bottom: 5px;">Editora:</label>
        <input type="text" name="editora" placeholder="Nome da editora" style="width: 100%; box-sizing: border-box;" required>
    </div>
    <div style="flex: 1; min-width: 150px;">
        <label style="display: block; margin-bottom: 5px;">Ano Publicação:</label>
        <input type="text" name="ano_publicacao" placeholder="Ex: 2026" style="width: 100%; box-sizing: border-box;" required>
    </div>
    <div style="flex: 1; min-width: 120px;">
        <label style="display: block; margin-bottom: 5px;">Páginas:</label>
        <input type="text" name="paginas" placeholder="Ex: 350" style="width: 100%; box-sizing: border-box;" required>
    </div>
    <div style="flex: 1; min-width: 200px;">
        <label style="display: block; margin-bottom: 5px;">Localização:</label>
        <input type="text" name="localizacao" placeholder="Ex: Estante 2" style="width: 100%; box-sizing: border-box;" required>
    </div>
    <div style="flex: 1; min-width: 150px;">
        <label style="display: block; margin-bottom: 5px;">Status:</label>
        <input type="text" name="status" placeholder="Ex: Disponível" style="width: 100%; box-sizing: border-box;" required>
    </div>
    <div style="flex: 1; min-width: 200px;">
        <label style="display: block; margin-bottom: 5px;">ISBN:</label>
        <input type="text" name="isbn" placeholder="000-0-00-000000-0" style="width: 100%; box-sizing: border-box;" required>
    </div>
    <div style="flex: 1; min-width: 250px;">
        <label style="display: block; margin-bottom: 5px;">Título:</label>
        <input type="text" name="titulo" placeholder="Nome do livro" style="width: 100%; box-sizing: border-box;" required>
    </div>
    <div style="flex: 1; min-width: 200px;">
        <label style="display: block; margin-bottom: 5px;">Autor:</label>
        <input type="text" name="autor" placeholder="Nome do autor" style="width: 100%; box-sizing: border-box;" required>
    </div>
    <div style="flex: 1; min-width: 180px;">
        <label style="display: block; margin-bottom: 5px;">Gênero:</label>
        <input type="text" name="genero" placeholder="Ex: Romance" style="width: 100%; box-sizing: border-box;" required>
    </div>

    <div style="width: 100%; margin-top: 10px;">
        <button type="submit" style="padding: 10px 20px; cursor: pointer;">Salvar Livro</button>
    </div>
</form>


{% endblock %}
